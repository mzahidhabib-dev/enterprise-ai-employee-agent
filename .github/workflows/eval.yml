name: Agent Evaluation Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  evaluate:
    name: RAGAS Quality Check
    runs-on: ubuntu-latest
    
    env:
      # Required secrets for the evaluation pipeline
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      
      # Mock the required tool APIs so the test doesn't fail on missing vars
      GMAIL_CLIENT_ID: "mock_client_id"
      GMAIL_CLIENT_SECRET: "mock_client_secret"
      GMAIL_REFRESH_TOKEN: "mock_refresh_token"
      SLACK_BOT_TOKEN: "mock_slack_token"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Download Spacy NLP Model
        run: python -m spacy download en_core_web_lg

      - name: Run Pytest Agent Evaluation
        # Set PYTHONPATH so the imports from `src.` resolve correctly
        run: PYTHONPATH=. pytest tests/test_eval.py -v
